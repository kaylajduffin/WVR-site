<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nonprofit Profile — WVR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wvr: {
              green: '#10B981',
              'green-dark': '#059669',
              blue: '#3B82F6',
              'blue-dark': '#2563EB',
              dark: '#111827',
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-white text-gray-800">

  <!-- Navigation -->
  <nav class="fixed top-0 w-full bg-white/95 backdrop-blur-sm border-b border-gray-100 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-wvr-green rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-sm">W</span>
        </div>
        <span class="text-xl font-bold text-wvr-dark">WVR</span>
      </a>
      <div class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-600">
        <a href="index.html" class="hover:text-wvr-green transition-colors">Home</a>
        <a href="nonprofits.html" class="hover:text-wvr-green transition-colors">Browse Nonprofits</a>
      </div>
      <button id="mobile-menu-btn" class="md:hidden p-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 bg-white px-6 py-4 space-y-3">
      <a href="index.html" class="block text-sm font-medium text-gray-600 hover:text-wvr-green">Home</a>
      <a href="nonprofits.html" class="block text-sm font-medium text-gray-600 hover:text-wvr-green">Browse Nonprofits</a>
    </div>
  </nav>

  <!-- Profile Content (injected by JS) -->
  <main id="profile-content" class="pt-24">
    <!-- Loading state -->
    <div class="max-w-4xl mx-auto px-6 py-20 text-center">
      <p class="text-gray-400">Loading nonprofit profile...</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-50 border-t border-gray-100 py-12 px-6 mt-12">
    <div class="max-w-6xl mx-auto">
      <div class="flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 bg-wvr-green rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-xs">W</span>
          </div>
          <span class="text-lg font-bold text-wvr-dark">World Value Revolution</span>
        </div>
        <div class="flex items-center gap-6 text-sm text-gray-500">
          <a href="index.html" class="hover:text-wvr-green transition-colors">Home</a>
          <a href="nonprofits.html" class="hover:text-wvr-green transition-colors">Nonprofits</a>
        </div>
      </div>
      <div class="mt-8 pt-6 border-t border-gray-200 text-center text-xs text-gray-400">
        &copy; 2026 World Value Revolution. Built at the Austin Christian University Accelerator.
      </div>
    </div>
  </footer>

  <script src="data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const np = nonprofits.find(n => n.id === id);
    const content = document.getElementById('profile-content');

    if (!np) {
      content.innerHTML = `
        <div class="max-w-4xl mx-auto px-6 py-20 text-center">
          <h2 class="text-2xl font-bold text-wvr-dark mb-4">Nonprofit not found</h2>
          <p class="text-gray-500 mb-6">The nonprofit you're looking for doesn't exist or may have been removed.</p>
          <a href="nonprofits.html" class="inline-block px-6 py-3 bg-wvr-green text-white font-semibold rounded-xl hover:bg-wvr-green-dark transition-colors">Browse All Nonprofits</a>
        </div>
      `;
    } else {
      document.title = `${np.name} — WVR`;

      function getHopeScoreLabel(score) {
        if (score >= 90) return 'Excellent Impact';
        if (score >= 80) return 'Strong Impact';
        if (score >= 70) return 'Good Impact';
        return 'Developing';
      }

      function getHopeScoreRingColor(score) {
        if (score >= 90) return '#10B981';
        if (score >= 80) return '#3B82F6';
        if (score >= 70) return '#F59E0B';
        return '#9CA3AF';
      }

      const ringColor = getHopeScoreRingColor(np.hopeScore);
      const dashOffset = 327 - (327 * np.hopeScore / 100);

      content.innerHTML = `
        <!-- Back link -->
        <div class="max-w-6xl mx-auto px-6 pt-4 pb-2">
          <a href="nonprofits.html" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-wvr-green transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Back to all nonprofits
          </a>
        </div>

        <!-- Hero Banner -->
        <div class="relative h-64 md:h-80 overflow-hidden">
          <img src="${np.photo}" alt="${np.name}" class="w-full h-full object-cover">
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
        </div>

        <div class="max-w-6xl mx-auto px-6 -mt-20 relative z-10">
          <!-- Profile Header Card -->
          <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 md:p-8 mb-8">
            <div class="flex flex-col md:flex-row md:items-start gap-6">
              <img src="${np.logo}" alt="${np.name} logo" class="w-20 h-20 rounded-2xl shadow-md border-4 border-white flex-shrink-0">
              <div class="flex-1 min-w-0">
                <div class="flex flex-wrap items-center gap-3 mb-2">
                  <h1 class="text-2xl md:text-3xl font-bold text-wvr-dark">${np.name}</h1>
                  <span class="px-3 py-1 bg-emerald-50 text-emerald-700 rounded-full text-xs font-semibold">IRS Verified</span>
                </div>
                <p class="text-gray-500 text-lg mb-4">${np.tagline}</p>
                <div class="flex flex-wrap items-center gap-4 text-sm text-gray-500">
                  <span class="flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    ${np.location}
                  </span>
                  <span class="flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                    ${np.category}
                  </span>
                  <span class="flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    Founded ${np.founded}
                  </span>
                </div>
              </div>
              <!-- Hope Score -->
              <div class="flex-shrink-0 text-center bg-gray-50 rounded-2xl p-5 border border-gray-100">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-2">Hope Score</p>
                <div class="relative w-24 h-24 mx-auto mb-2">
                  <svg class="w-24 h-24 transform -rotate-90" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="52" fill="none" stroke="#E5E7EB" stroke-width="8"/>
                    <circle cx="60" cy="60" r="52" fill="none" stroke="${ringColor}" stroke-width="8" stroke-dasharray="327" stroke-dashoffset="${dashOffset}" stroke-linecap="round"/>
                  </svg>
                  <div class="absolute inset-0 flex items-center justify-center">
                    <span class="text-3xl font-extrabold text-wvr-dark">${np.hopeScore}</span>
                  </div>
                </div>
                <p class="text-sm font-semibold" style="color: ${ringColor}">${getHopeScoreLabel(np.hopeScore)}</p>
              </div>
            </div>
          </div>

          <!-- Content Grid -->
          <div class="grid lg:grid-cols-3 gap-8">
            <!-- Left Column: Main Content -->
            <div class="lg:col-span-2 space-y-8">

              <!-- About -->
              <div class="bg-white rounded-2xl border border-gray-100 p-6 md:p-8">
                <h2 class="text-xl font-bold text-wvr-dark mb-4">About</h2>
                <p class="text-gray-600 leading-relaxed">${np.description}</p>
              </div>

              <!-- Programs -->
              <div class="bg-white rounded-2xl border border-gray-100 p-6 md:p-8">
                <h2 class="text-xl font-bold text-wvr-dark mb-4">Programs</h2>
                <div class="grid sm:grid-cols-2 gap-3">
                  ${np.programs.map(p => `
                    <div class="flex items-center gap-3 bg-gray-50 rounded-xl p-4">
                      <div class="w-8 h-8 bg-wvr-green/10 rounded-lg flex items-center justify-center flex-shrink-0">
                        <svg class="w-4 h-4 text-wvr-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                      </div>
                      <span class="text-sm font-medium text-gray-700">${p}</span>
                    </div>
                  `).join('')}
                </div>
              </div>

              <!-- Leadership -->
              <div class="bg-white rounded-2xl border border-gray-100 p-6 md:p-8">
                <h2 class="text-xl font-bold text-wvr-dark mb-6">Leadership</h2>
                <div class="grid sm:grid-cols-3 gap-6">
                  ${np.leadership.map(l => `
                    <div class="text-center">
                      <img src="${l.photo}" alt="${l.name}" class="w-20 h-20 rounded-full mx-auto mb-3 border-2 border-gray-100">
                      <h4 class="font-semibold text-wvr-dark text-sm">${l.name}</h4>
                      <p class="text-xs text-gray-500 mb-2">${l.title}</p>
                      <a href="${l.linkedin}" class="inline-flex items-center gap-1 text-xs text-wvr-blue hover:underline">
                        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                        LinkedIn
                      </a>
                    </div>
                  `).join('')}
                </div>
              </div>

              <!-- Financial Performance -->
              <div class="bg-white rounded-2xl border border-gray-100 p-6 md:p-8">
                <h2 class="text-xl font-bold text-wvr-dark mb-6">Financial Overview</h2>
                <div class="grid grid-cols-3 gap-4 mb-6">
                  <div class="text-center bg-emerald-50 rounded-xl p-4">
                    <p class="text-2xl font-bold text-wvr-green">${np.financials.programExpenseRatio}</p>
                    <p class="text-xs text-gray-500 mt-1">Programs</p>
                  </div>
                  <div class="text-center bg-blue-50 rounded-xl p-4">
                    <p class="text-2xl font-bold text-wvr-blue">${np.financials.adminExpenseRatio}</p>
                    <p class="text-xs text-gray-500 mt-1">Admin</p>
                  </div>
                  <div class="text-center bg-gray-50 rounded-xl p-4">
                    <p class="text-2xl font-bold text-gray-600">${np.financials.fundraisingExpenseRatio}</p>
                    <p class="text-xs text-gray-500 mt-1">Fundraising</p>
                  </div>
                </div>
                <!-- Expense bar -->
                <div class="w-full h-4 bg-gray-100 rounded-full overflow-hidden flex">
                  <div class="bg-wvr-green h-full" style="width: ${np.financials.programExpenseRatio}"></div>
                  <div class="bg-wvr-blue h-full" style="width: ${np.financials.adminExpenseRatio}"></div>
                  <div class="bg-gray-400 h-full" style="width: ${np.financials.fundraisingExpenseRatio}"></div>
                </div>
                <div class="flex justify-between text-xs text-gray-400 mt-2">
                  <span>Programs</span><span>Admin</span><span>Fundraising</span>
                </div>
              </div>

              <!-- Documents / Reports -->
              <div class="bg-white rounded-2xl border border-gray-100 p-6 md:p-8">
                <h2 class="text-xl font-bold text-wvr-dark mb-4">Documents &amp; Reports</h2>
                <div class="space-y-3">
                  <div class="flex items-center justify-between bg-gray-50 rounded-xl p-4">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 bg-red-50 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                      </div>
                      <div>
                        <p class="text-sm font-medium text-wvr-dark">Annual Report 2025</p>
                        <p class="text-xs text-gray-400">PDF &middot; Published Jan 2026</p>
                      </div>
                    </div>
                    <span class="text-xs text-gray-400">Coming soon</span>
                  </div>
                  <div class="flex items-center justify-between bg-gray-50 rounded-xl p-4">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-wvr-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                      </div>
                      <div>
                        <p class="text-sm font-medium text-wvr-dark">IRS Form 990 (2024)</p>
                        <p class="text-xs text-gray-400">PDF &middot; Filed Nov 2025</p>
                      </div>
                    </div>
                    <span class="text-xs text-gray-400">Coming soon</span>
                  </div>
                  <div class="flex items-center justify-between bg-gray-50 rounded-xl p-4">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 bg-emerald-50 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-wvr-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                      </div>
                      <div>
                        <p class="text-sm font-medium text-wvr-dark">Impact Proforma 2025</p>
                        <p class="text-xs text-gray-400">PDF &middot; Q4 Performance Summary</p>
                      </div>
                    </div>
                    <span class="text-xs text-gray-400">Coming soon</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- Right Column: Sidebar -->
            <div class="space-y-6">

              <!-- Quick Facts -->
              <div class="bg-white rounded-2xl border border-gray-100 p-6">
                <h3 class="text-lg font-bold text-wvr-dark mb-4">Quick Facts</h3>
                <dl class="space-y-4">
                  <div>
                    <dt class="text-xs text-gray-400 uppercase tracking-wider">Annual Budget</dt>
                    <dd class="text-sm font-semibold text-wvr-dark mt-0.5">${np.annualBudget}</dd>
                  </div>
                  <div>
                    <dt class="text-xs text-gray-400 uppercase tracking-wider">People Served</dt>
                    <dd class="text-sm font-semibold text-wvr-dark mt-0.5">${np.peopleServed}</dd>
                  </div>
                  <div>
                    <dt class="text-xs text-gray-400 uppercase tracking-wider">EIN</dt>
                    <dd class="text-sm font-semibold text-wvr-dark mt-0.5">${np.ein}</dd>
                  </div>
                  <div>
                    <dt class="text-xs text-gray-400 uppercase tracking-wider">Founded</dt>
                    <dd class="text-sm font-semibold text-wvr-dark mt-0.5">${np.founded}</dd>
                  </div>
                </dl>
              </div>

              <!-- Contact -->
              <div class="bg-white rounded-2xl border border-gray-100 p-6">
                <h3 class="text-lg font-bold text-wvr-dark mb-4">Contact</h3>
                <div class="space-y-3">
                  <a href="${np.website}" target="_blank" class="flex items-center gap-3 text-sm text-gray-600 hover:text-wvr-green transition-colors">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
                    <span class="truncate">${np.website.replace('https://', '')}</span>
                  </a>
                  <div class="flex items-center gap-3 text-sm text-gray-600">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                    ${np.phone}
                  </div>
                  <div class="flex items-start gap-3 text-sm text-gray-600">
                    <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    ${np.address}
                  </div>
                </div>
              </div>

              <!-- CTA -->
              <div class="bg-gradient-to-br from-emerald-50 to-blue-50 rounded-2xl border border-emerald-100 p-6 text-center">
                <h3 class="text-lg font-bold text-wvr-dark mb-2">Interested in this nonprofit?</h3>
                <p class="text-sm text-gray-500 mb-4">Sign up for WVR to connect directly with ${np.name} and track their impact over time.</p>
                <button class="w-full px-6 py-3 bg-wvr-green hover:bg-wvr-green-dark text-white font-semibold rounded-xl transition-colors text-sm">
                  Join WVR to Connect
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // Mobile menu
    const btn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    btn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
  </script>
</body>
</html>
